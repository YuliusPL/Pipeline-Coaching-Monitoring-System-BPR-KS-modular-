<div id="v-home">
  <div class="card-mewah mb-2 shadow-sm">
    <div class="row g-1">
      <div class="col-6"><input type="date" id="f-start" class="form-control form-control-sm" onchange="runFilter()"></div>
      <div class="col-6"><input type="date" id="f-end" class="form-control form-control-sm" onchange="runFilter()"></div>
      <div class="col-6 mt-1"><select id="f-c" class="form-select form-select-sm" onchange="runFilter(true)"></select></div>
      <div class="col-6 mt-1"><select id="f-n" class="form-select form-select-sm" onchange="runFilter()"></select></div>
    </div>
  </div>

  <div class="card-mewah hero-stat text-center shadow mb-2">
    <div class="d-flex justify-content-center mb-1">
      <div style="width:130px; position:relative;">
        <canvas id="gChart"></canvas>
        <div style="position:absolute; top:65%; left:50%; transform:translate(-50%,-50%); text-align:center;">
          <h3 class="fw-bold mb-0" id="g-p" style="font-size:24px;">0%</h3>
        </div>
      </div>
    </div>
    <p class="small mb-0 opacity-75" style="font-size:10px; font-weight: 700;">TOTAL REALISASI :</p>
    <h2 class="fw-bold mb-1" id="g-r" style="font-size: 28px;">Rp 0</h2>
    <div class="mt-2 py-2" style="background: rgba(255,255,255,0.1); border-radius: 15px;">
      <p class="small mb-0 opacity-75" style="font-size:10px; font-weight: 700;">TOTAL TARGET :</p>
      <h4 class="fw-bold mb-0" id="g-t" style="font-size: 19px;">Rp 0</h4>
    </div>
  </div>

  <div class="row g-2 mb-3">
    <div class="col-4"><div class="card-mewah p-2 text-center" style="height:100%"><small class="fw-bold text-muted">CS</small><span class="jab-pct" id="cs-p" style="background:var(--primary)">0%</span><div class="jab-detail">TARGET:<br><b id="cs-tgt">0</b><br>REALS:<br><b id="cs-ach">0</b></div></div></div>
    <div class="col-4"><div class="card-mewah p-2 text-center" style="height:100%"><small class="fw-bold text-muted">SPV</small><span class="jab-pct" id="spv-p" style="background:var(--app-blue)">0%</span><div class="jab-detail">TARGET:<br><b id="spv-tgt">0</b><br>REALS:<br><b id="spv-ach">0</b></div></div></div>
    <div class="col-4"><div class="card-mewah p-2 text-center" style="height:100%"><small class="fw-bold text-muted">TELE</small><span class="jab-pct" id="tele-p" style="background:var(--pen-orange)">0%</span><div class="jab-detail">TARGET:<br><b id="tele-tgt">0</b><br>REALS:<br><b id="tele-ach">0</b></div></div></div>
  </div>
  <div id="cair-list"></div>
</div>
