<script>
  let db = { achv:[], cair:[], pipeline:[], listCHome:[], listCPipe:[], listS:[] }, chartMix = null;
  let pipeFiltered = [], rowLimit = 25, searchTimeout = null;

  function initApp() {
    const stored = sessionStorage.getItem('cc_modular_v1');
    if (stored) { db = JSON.parse(stored); renderUI(); document.getElementById('loader-global').style.display='none'; } 
    else { fetchDB(); }
  }

  function fetchDB() {
    google.script.run.withSuccessHandler(res => { 
      db = res; sessionStorage.setItem('cc_modular_v1', JSON.stringify(res)); 
      renderUI(); document.getElementById('loader-global').style.display='none'; 
    }).getDashboardData();
  }

  function renderUI() {
    document.getElementById('u-nama').innerText = db.u.nama;
    const fill = (id, list, txt) => { const s = document.getElementById(id); if(!s) return; s.innerHTML = `<option value="">${txt}</option>`; [...new Set(list)].sort().forEach(v => s.add(new Option(v, v))); };
    fill('f-c', db.listCHome, "Pilih Cabang"); 
    fill('p-c', db.listCPipe, "Semua Cabang"); 
    syncSalesByBranch();
    runFilter(true);
  }

  function syncSalesByBranch() {
    const cab = document.getElementById('p-c'); if(!cab) return;
    const salesSelect = document.getElementById('p-s');
    const filteredSales = [...new Set(db.pipeline.filter(x => cab.value==="" || x[8]===cab.value).map(x => x[6]))].sort();
    salesSelect.innerHTML = '<option value="">Semua Sales</option>';
    filteredSales.forEach(s => salesSelect.add(new Option(s, s)));
    filterPipe();
  }

  function refreshData() {
    sessionStorage.removeItem('cc_modular_v1');
    Swal.fire({ title: 'Sync...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
    fetchDB();
    setTimeout(() => { Swal.fire({ icon:'success', title:'Updated', timer:800, showConfirmButton:false }); }, 1500);
  }

  function switchPage(p) {
    ['v-home','v-pipe','v-coaching','v-admin'].forEach(v => {
      const el = document.getElementById(v);
      if(el) el.style.display = 'none';
    });
    ['n-h','n-p','n-c','n-a'].forEach(n => {
      const el = document.getElementById(n);
      if(el) el.classList.remove('active');
    });
    const target = document.getElementById('v-'+p);
    if(target) target.style.display = 'block';
    const nav = document.getElementById('n-'+p.charAt(0));
    if(nav) nav.classList.add('active');
  }

  function runFilter(isBC = false) {
    const s = document.getElementById('f-start').value || "1900-01-01", e = document.getElementById('f-end').value || "2100-12-31", c = document.getElementById('f-c').value, n = document.getElementById('f-n').value;
    if (isBC) {
      const sSel = document.getElementById('f-n'); sSel.innerHTML = '<option value="">Semua Staff</option>';
      db.achv.filter(r => c==="" || r[1]===c).map(r => r[2]).filter((v,i,a) => a.indexOf(v)===i).sort().forEach(st => sSel.add(new Option(st, st)));
    }
    const getLatest = (src) => {
      let u = {}; src.forEach(r => { if(r[0]>=s && r[0]<=e && (c===""||r[1]===c) && (n===""||r[2]===n)) { let k=r[1]+r[2]+(r[3]||""); if(!u[k]||r[0]>u[k][0]) u[k]=r; } });
      return Object.values(u);
    };
    const fA = getLatest(db.achv), fC = getLatest(db.cair);
    let resA = { global:{r:0,t:0}, cs:{r:0,t:0}, spv:{r:0,t:0}, tele:{r:0,t:0} };
    fA.forEach(r => { resA.global.r += r[5]; resA.global.t += r[4]; if(resA[r[3]]) { resA[r[3]].r += r[5]; resA[r[3]].t += r[4]; } });
    document.getElementById('g-r').innerText = "Rp " + resA.global.r.toLocaleString('id-ID');
    document.getElementById('g-t').innerText = "Rp " + resA.global.t.toLocaleString('id-ID');
    let pG = resA.global.t > 0 ? (resA.global.r / resA.global.t * 100).toFixed(1) : 0;
    document.getElementById('g-p').innerText = pG + "%";
    ['cs','spv','tele'].forEach(k => {
      let p = resA[k].t > 0 ? (resA[k].r / resA[k].t * 100).toFixed(1) : 0;
      document.getElementById(k+'-p').innerText = p + "%";
      document.getElementById(k+'-tgt').innerText = "Rp " + resA[k].t.toLocaleString('id-ID');
      document.getElementById(k+'-ach').innerText = "Rp " + resA[k].r.toLocaleString('id-ID');
    });
    let resC = {}, gI = 0; fC.forEach(r => { if(!resC[r[3]]) resC[r[3]] = { q:0, v:0 }; resC[r[3]].q += r[4]; resC[r[3]].v += r[5]; gI += r[4]; });
    let h = ""; Object.keys(resC).sort().forEach(p => { h += `<div class="cair-row"><div><b>${p}</b><br><small>${resC[p].q} Item</small></div><div class="text-end"><span class="text-primary fw-bold">Rp ${resC[p].v.toLocaleString('id-ID')}</span></div></div>`; });
    h += `<div class="cair-row total-row"><div><b>GRAND TOTAL REALISASI</b><br><small>${gI.toLocaleString('id-ID')} Item</small></div><div class="text-end"><span class="total-val-gagah">Rp ${resA.global.r.toLocaleString('id-ID')}</span></div></div>`;
    document.getElementById('cair-list').innerHTML = h || "<p class='text-center py-5 small text-muted'>Kosong</p>";
    const ctx = document.getElementById('gChart').getContext('2d'); if(window.myChart) window.myChart.destroy();
    window.myChart = new Chart(ctx, { type:'doughnut', data:{ datasets:[{ data:[pG, 100-pG], backgroundColor:['#00A8E8','rgba(255,255,255,0.1)'], borderWidth:0, cutout:'80%', circumference:240, rotation:240 }] }, options:{ plugins:{ tooltip:{enabled:false} } } });
  }

  function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { filterTablePipe(); }, 200); }

  function filterPipe() {
    const sD = document.getElementById('p-start').value || "1900-01-01", eD = document.getElementById('p-end').value || "2100-12-31", c = document.getElementById('p-c').value, sal = document.getElementById('p-s').value;
    pipeFiltered = db.pipeline.filter(x => x[0]>=sD && x[0]<=eD && (c==="" || x[8]===c) && (sal==="" || x[6]===sal));
    calculatePipeline();
  }

  function calculatePipeline() {
    let m = { apk:0, app:0, rej:0, cair:0, pla:0, ag:[0,0,0,0] };
    let sPerf = {}, pMix = {}, today = new Date().getTime();

    pipeFiltered.forEach(r => {
      m.apk++; m.pla += r[7];
      const st = r[3].toUpperCase(), kp = r[5].toUpperCase(), mixVal = r[4].toUpperCase();
      if(kp.includes('APPROVE')) m.app++;
      if(kp.includes('REJECT')) m.rej++;
      if(st === 'CAIR') m.cair++;
      pMix[mixVal] = (pMix[mixVal] || 0) + 1;
      
      const diff = Math.floor((today - r[1]) / 86400000);
      if(diff <= 3) m.ag[0]++; else if(diff <= 7) m.ag[1]++; else if(diff <= 14) m.ag[2]++; else m.ag[3]++;
      if(!sPerf[r[6]]) sPerf[r[6]] = { p:0, a:0 }; sPerf[r[6]].p += r[7]; sPerf[r[6]].a++;
    });

    document.getElementById('k-pla').innerText = "Rp " + m.pla.toLocaleString('id-ID');
    document.getElementById('k-conv').innerText = (m.apk > 0 ? (m.app/m.apk*100).toFixed(1) : 0) + "%";
    document.getElementById('k-avg').innerText = "Rp " + (m.apk > 0 ? Math.round(m.pla/m.apk).toLocaleString('id-ID') : 0);
    document.getElementById('fn-naik').innerText = m.apk; document.getElementById('fn-app').innerText = m.app;
    document.getElementById('fn-cair').innerText = m.cair; document.getElementById('fn-rej').innerText = m.rej;
    [1,2,3,4].forEach(i => document.getElementById('ag-'+i).innerText = m.ag[i-1]);

    const sorted = Object.entries(sPerf).sort((a,b) => b[1].p - a[1].p);
    let tH = ""; sorted.slice(0,10).forEach((item, i) => { tH += `<div class='rank-row'><span>${i+1}. ${item[0]}</span><b>Rp ${item[1].p.toLocaleString('id-ID')}</b></div>`; });
    let bH = ""; sorted.slice(-10).reverse().forEach((item, i) => { bH += `<div class='rank-row bottom-alert'><span>${i+1}. ${item[0]}</span><b>${item[1].a} Apk</b></div>`; });
    document.getElementById('top-sales-list').innerHTML = tH || "-"; document.getElementById('bot-sales-list').innerHTML = bH || "-";

    const ctxM = document.getElementById('pChartMix').getContext('2d'); if(chartMix) chartMix.destroy();
    chartMix = new Chart(ctxM, { type:'doughnut', data:{ labels:Object.keys(pMix), datasets:[{ data:Object.values(pMix), backgroundColor:['#002D57','#00A8E8','#198754','#DC3545','#FFC107','#FD7E14'], borderWidth:0 }] }, options:{ plugins:{ legend:{position:'bottom', labels:{boxWidth:10, font:{size:10}}} }, cutout:'60%' } });
    renderTablePipe(pipeFiltered);
  }

  function renderTablePipe(data) {
    let h = ""; data.slice(0, rowLimit).forEach(r => {
      let sc = ""; let kc = "";
      const st = r[3].toUpperCase(); const kp = r[5].toUpperCase();
      if (st.includes('APK') || st.includes('MASUK')) sc = "st-apk";
      else if (st === 'CAIR') sc = "st-cair";
      else if (st.includes('PENDING')) sc = "st-pen";
      else if (st.includes('BELUM')) sc = "st-bel";
      else sc = "st-app";

      if (kp.includes('REJECT')) kc = "st-rej";
      else if (kp.includes('APPROVE')) kc = "st-app";
      else kc = "st-apk";
      
      h += `<tr><td><b>${r[2]}</b></td><td><small>${r[6]}</small></td><td><span class="badge-status ${sc}">${r[3]}</span></td><td><span class="badge-status ${kc}">${r[5] || "-"}</span></td><td class="fw-bold">Rp ${r[7].toLocaleString('id-ID')}</td></tr>`;
    });
    document.getElementById('pipe-body').innerHTML = h || "<tr><td colspan='5' class='text-center p-4'>Kosong</td></tr>";
    document.getElementById('p-info').innerText = `${data.length} Data Terfilter`;
  }

  function filterTablePipe() { const q = document.getElementById('p-search').value.toLowerCase(); const temp = pipeFiltered.filter(x => x[2].toLowerCase().includes(q) || x[6].toLowerCase().includes(q) || x[3].toLowerCase().includes(q) || x[5].toLowerCase().includes(q)); renderTablePipe(temp); }
  function execU() { const f = document.getElementById('u-f').files[0], t = document.getElementById('u-t').value, j = document.getElementById('u-j').value; if(!f || !t) return Swal.fire('Error', 'Lengkapi data!', 'error'); Swal.fire({ title: 'Uploading...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } }); const r = new FileReader(); r.onload = function(e) { const rows = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type:'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type:'array'}).SheetNames[0]], {header:1}); google.script.run.withSuccessHandler(res => { Swal.fire('Sukses', res, 'success').then(() => refreshData()); }).processExcelData(rows, t, j); }; r.readAsArrayBuffer(f); }
</script>
